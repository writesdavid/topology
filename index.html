<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topology</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; font-family: 'EB Garamond', serif; }
  canvas { display: block; position: absolute; top: 0; left: 0; }

  #panel {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    padding: 48px 0 0 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
    pointer-events: none;
  }

  #narration {
    color: rgba(255,255,255,0);
    font-size: 20px;
    line-height: 1.8;
    letter-spacing: 0.02em;
    text-align: center;
    transition: color 2s ease;
  }

  #narration.visible {
    color: rgba(255,255,255,0.55);
  }

  #narration em {
    font-style: italic;
    color: rgba(255,255,255,0.7);
  }

  .phase-line {
    display: block;
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 1.2s ease, transform 1.2s ease;
  }

  .phase-line.show {
    opacity: 1;
    transform: translateY(0);
  }

  #phase-label {
    margin-top: 24px;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.12);
  }

  #identity {
    position: absolute;
    bottom: 40px;
    left: 0;
    width: 100%;
    text-align: center;
    z-index: 10;
    pointer-events: auto;
  }

  #identity .name {
    font-size: 14px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.35);
    margin-bottom: 6px;
  }

  #identity .focus {
    font-size: 12px;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.18);
    margin-bottom: 8px;
  }

  #identity a {
    font-size: 11px;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.15);
    text-decoration: none;
    transition: color 0.4s ease;
  }

  #identity a:hover {
    color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="identity">
  <div class="name">David Hamilton</div>
  <div class="focus">designer, writer, ai engineer, anthropologist</div>
  <a href="mailto:davehamiltonj@gmail.com">davehamiltonj@gmail.com</a>
</div>
<div id="panel">
  <div id="narration"></div>
  <div id="phase-label"></div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const narrationEl = document.getElementById('narration');
const phaseLabelEl = document.getElementById('phase-label');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const VOICE_COUNT = 2;
const PARTICLES_PER_VOICE = 120;

const PHASES = {
  noise:   { min: 6000, max: 9000 },
  sprint:  { min: 3000, max: 5000 },
  depth:   { min: 7000, max: 11000 },
  making:  { min: 5000, max: 7000 },
  calm:    { min: 3000, max: 5000 },
};
const PHASE_ORDER = ['noise', 'sprint', 'depth', 'making', 'calm'];

// First-person narration per phase — multiple variants, chosen randomly
const NARRATIONS = {
  noise: [
    [
      "Two voices.",
      "One asks <em>what is that.</em>",
      "The other asks <em>what could it be.</em>",
      "Neither stops."
    ],
    [
      "Something doesn't add up.",
      "I keep turning it over.",
      "The friction isn't pain.",
      "It's how the shape reveals itself."
    ],
    [
      "A question I can't resolve.",
      "Every angle opens another.",
      "I stay in it.",
      "The not-knowing is the point."
    ],
  ],
  sprint: [
    [
      "A thread.",
      "I need to know where it goes.",
      "Pulling at it now.",
      "Feeling for the edges."
    ],
    [
      "Something opened up.",
      "Relief. Moving again.",
      "Not toward an answer —",
      "toward the shape of the question."
    ],
    [
      "I can't explain what caught me.",
      "Only that it did.",
      "Following it.",
      "Wanting to understand."
    ],
  ],
  depth: [
    [
      "I didn't decide to go here.",
      "I just realized",
      "I've been still for hours.",
      "The depth took me."
    ],
    [
      "Alone now.",
      "The world is far away.",
      "One thing, all the way down.",
      "Gone."
    ],
    [
      "Time moved without me.",
      "I was somewhere inside it.",
      "Studying the grain.",
      "Fascinated."
    ],
  ],
  making: [
    [
      "Hands on material.",
      "The voices go quiet.",
      "The only silence I know.",
      "It comes from making."
    ],
    [
      "Typing. Building.",
      "The argument resolves",
      "into form.",
      "Quiet now."
    ],
    [
      "Nothing to debate.",
      "The thing is taking shape.",
      "Friction becoming structure.",
      "Silence."
    ],
  ],
  calm: [
    [
      "Finished.",
      "A calm I didn't earn.",
      "It just arrives.",
      "For now."
    ],
    [
      "A pause.",
      "Not rest — just the space",
      "between one fascination",
      "and the next."
    ],
    [
      "Still for a while.",
      "Then a sprout.",
      "A new edge somewhere.",
      "And it starts again."
    ],
  ],
};

let currentPhase = 0;
let phaseTime = 0;
let phaseDuration = 5000;
let phaseProgress = 0;
let lastPhaseName = '';

function nextPhaseDuration(phase) {
  const p = PHASES[PHASE_ORDER[phase]];
  return p.min + Math.random() * (p.max - p.min);
}
phaseDuration = nextPhaseDuration(currentPhase);

// Narration management
function setNarration(phaseName) {
  if (phaseName === lastPhaseName) return;
  lastPhaseName = phaseName;

  const variants = NARRATIONS[phaseName];
  const lines = variants[Math.floor(Math.random() * variants.length)];

  narrationEl.classList.remove('visible');

  setTimeout(() => {
    narrationEl.innerHTML = lines.map(l => `<span class="phase-line">${l}</span>`).join('');
    phaseLabelEl.textContent = phaseName;

    setTimeout(() => {
      narrationEl.classList.add('visible');
      const spans = narrationEl.querySelectorAll('.phase-line');
      spans.forEach((span, i) => {
        setTimeout(() => span.classList.add('show'), i * 600);
      });
    }, 300);
  }, 800);
}

class Particle {
  constructor(voice) {
    this.voice = voice;
    this.x = W / 2 + (Math.random() - 0.5) * 200;
    this.y = H / 2 + (Math.random() - 0.5) * 200;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;
    this.baseRadius = 1 + Math.random() * 2;
    this.radius = this.baseRadius;
    this.angle = Math.random() * Math.PI * 2;
    this.speed = 0.5 + Math.random() * 1.5;
    this.orbitRadius = 50 + Math.random() * 150;
    this.phase = Math.random() * Math.PI * 2;
  }
}

const voices = [[], []];
for (let v = 0; v < VOICE_COUNT; v++) {
  for (let i = 0; i < PARTICLES_PER_VOICE; i++) {
    voices[v].push(new Particle(v));
  }
}

const COLORS = [
  { r: 255, g: 120, b: 80 },
  { r: 80, g: 160, b: 255 },
];

function lerpColor(c, alpha) {
  return `rgba(${c.r},${c.g},${c.b},${alpha})`;
}

function getAttractor(voice, phase, t) {
  const cx = W / 2;
  const cy = H / 2;
  const phaseName = PHASE_ORDER[phase];
  const offset = voice === 0 ? -1 : 1;

  switch (phaseName) {
    case 'noise':
      return {
        x: cx + Math.cos(t * 0.0008 + voice * Math.PI) * 180,
        y: cy + Math.sin(t * 0.0012 + voice * Math.PI) * 120,
        spread: 160, speed: 1.8, orbit: true,
      };
    case 'sprint':
      return {
        x: cx + 100 + Math.cos(t * 0.002) * 40 + offset * 60,
        y: cy + Math.sin(t * 0.003 + voice * 1.5) * 80,
        spread: 100, speed: 3.0, orbit: false,
      };
    case 'depth':
      return {
        x: cx + offset * 30 * Math.cos(t * 0.0003),
        y: cy + offset * 30 * Math.sin(t * 0.0004),
        spread: 40 + 30 * (1 - phaseProgress), speed: 0.3, orbit: true,
      };
    case 'making':
      return {
        x: cx, y: cy,
        spread: 8 + 20 * (1 - phaseProgress), speed: 0.15, orbit: false,
      };
    case 'calm':
      return {
        x: cx + offset * (40 + phaseProgress * 80),
        y: cy + Math.sin(t * 0.0005) * 20,
        spread: 60 + phaseProgress * 100, speed: 0.4, orbit: false,
      };
  }
}

let time = 0;
let lastTime = performance.now();

function breathe(t) {
  return 0.7 + 0.3 * Math.sin(t * 0.001);
}

function drawConnections(particles, color, alpha) {
  const maxDist = 80;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < maxDist) {
        const a = (1 - dist / maxDist) * alpha * 0.3;
        ctx.strokeStyle = lerpColor(color, a);
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
}

function drawTension(v0, v1, alpha) {
  const maxDist = 120;
  const phaseName = PHASE_ORDER[currentPhase];
  if (phaseName === 'making' || phaseName === 'calm') return;

  for (let i = 0; i < v0.length; i += 3) {
    for (let j = 0; j < v1.length; j += 3) {
      const dx = v0[i].x - v1[j].x;
      const dy = v0[i].y - v1[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < maxDist) {
        const a = (1 - dist / maxDist) * alpha * 0.15;
        ctx.strokeStyle = `rgba(255,255,255,${a})`;
        ctx.lineWidth = 0.3;
        ctx.beginPath();
        ctx.moveTo(v0[i].x, v0[i].y);
        ctx.lineTo(v1[j].x, v1[j].y);
        ctx.stroke();
      }
    }
  }
}

function update(dt) {
  time += dt;
  phaseTime += dt;
  phaseProgress = Math.min(phaseTime / phaseDuration, 1);

  if (phaseTime >= phaseDuration) {
    currentPhase = (currentPhase + 1) % PHASE_ORDER.length;
    phaseTime = 0;
    phaseDuration = nextPhaseDuration(currentPhase);
    phaseProgress = 0;
  }

  setNarration(PHASE_ORDER[currentPhase]);

  for (let v = 0; v < VOICE_COUNT; v++) {
    const attr = getAttractor(v, currentPhase, time);
    for (const p of voices[v]) {
      const dx = attr.x - p.x;
      const dy = attr.y - p.y;
      const force = 0.002 * attr.speed;
      p.vx += dx * force;
      p.vy += dy * force;

      if (attr.orbit) {
        p.angle += p.speed * 0.02 * attr.speed;
        const ox = Math.cos(p.angle + p.phase) * p.orbitRadius * (attr.spread / 100);
        const oy = Math.sin(p.angle + p.phase) * p.orbitRadius * (attr.spread / 100);
        p.vx += (attr.x + ox - p.x) * 0.003;
        p.vy += (attr.y + oy - p.y) * 0.003;
      }

      p.vx += (Math.random() - 0.5) * 0.3 * attr.speed;
      p.vy += (Math.random() - 0.5) * 0.3 * attr.speed;
      p.vx *= 0.96;
      p.vy *= 0.96;
      p.x += p.vx;
      p.y += p.vy;

      if (p.x < 0) p.vx += 0.5;
      if (p.x > W) p.vx -= 0.5;
      if (p.y < 0) p.vy += 0.5;
      if (p.y > H) p.vy -= 0.5;

      p.radius = p.baseRadius * (0.8 + 0.4 * Math.sin(time * 0.003 + p.phase));
    }
  }
}

function draw() {
  const phaseName = PHASE_ORDER[currentPhase];
  const fadeAlpha = phaseName === 'depth' ? 0.06 :
                    phaseName === 'making' ? 0.03 :
                    phaseName === 'calm' ? 0.04 : 0.1;

  ctx.fillStyle = `rgba(10,10,10,${fadeAlpha})`;
  ctx.fillRect(0, 0, W, H);

  const breath = breathe(time);

  drawTension(voices[0], voices[1], breath);

  for (let v = 0; v < VOICE_COUNT; v++) {
    const color = COLORS[v];
    drawConnections(voices[v], color, breath);

    for (const p of voices[v]) {
      const alpha = breath * (0.5 + 0.5 * (p.radius / (p.baseRadius * 1.2)));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = lerpColor(color, alpha);
      ctx.fill();

      if (phaseName === 'making') {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius * 3, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 3);
        grad.addColorStop(0, lerpColor({ r: 255, g: 220, b: 200 }, 0.15));
        grad.addColorStop(1, 'rgba(10,10,10,0)');
        ctx.fillStyle = grad;
        ctx.fill();
      }
    }
  }
}

function loop(now) {
  const dt = Math.min(now - lastTime, 50);
  lastTime = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

setNarration(PHASE_ORDER[currentPhase]);
requestAnimationFrame(loop);
</script>
</body>
</html>
